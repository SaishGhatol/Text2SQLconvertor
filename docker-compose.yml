version: "3.9"

services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartquery-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/smartquery.db
      - SECRET_KEY=change-this-to-a-secure-random-string-32-chars-min
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=phi3
      - ALLOWED_ORIGINS=["http://localhost:5173","http://localhost:80"]
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    networks:
      - smartquery-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React + Vite preview) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartquery-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smartquery-net

  # ── Ollama (Local LLM) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: smartquery-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - smartquery-net

volumes:
  ollama-data:

networks:
  smartquery-net:
    driver: bridge
